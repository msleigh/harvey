name: Deploy Documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build and deploy documentation
    runs-on: ubuntu-latest
    env:
      DOCS_SSH_PRIVATE_KEY: ${{ secrets.DOCS_SSH_PRIVATE_KEY }}
      DOCS_SSH_USER: ${{ secrets.DOCS_SSH_USER }}
      DOCS_SSH_HOST: ${{ secrets.DOCS_SSH_HOST }}
      DOCS_SSH_PATH: ${{ secrets.DOCS_SSH_PATH }}
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - uses: actions/checkout@v7

      - name: Build documentation with Doxygen
        uses: mattnotmitt/doxygen-action@v1.12.0
        with:
          working-directory: 'doc'
          doxyfile-path: 'Doxyfile'
          enable-latex: true

      - name: Deploy docs via SSH
        if: >-
          env.DOCS_SSH_PRIVATE_KEY != '' &&
          env.DOCS_SSH_USER != '' &&
          env.DOCS_SSH_HOST != '' &&
          env.DOCS_SSH_PATH != ''
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ env.DOCS_SSH_PRIVATE_KEY }}

      - name: Disable strict host key checking
        if: >-
          env.DOCS_SSH_PRIVATE_KEY != '' &&
          env.DOCS_SSH_USER != '' &&
          env.DOCS_SSH_HOST != '' &&
          env.DOCS_SSH_PATH != ''
        run: |
          mkdir -p ~/.ssh
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Deploy to server
        if: >-
          env.DOCS_SSH_PRIVATE_KEY != '' &&
          env.DOCS_SSH_USER != '' &&
          env.DOCS_SSH_HOST != '' &&
          env.DOCS_SSH_PATH != ''
        run: |
          rsync -avz --delete \
            doc/html/ \
            "${{ env.DOCS_SSH_USER }}@${{ env.DOCS_SSH_HOST }}:${{ env.DOCS_SSH_PATH }}"
